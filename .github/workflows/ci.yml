name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Cache dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build
        run: npm run build

      - name: Save build output
        uses: actions/cache/save@v4
        with:
          path: |
            apps/web/.next
            apps/strapi/dist
            apps/strapi/build
          key: build-${{ github.sha }}

  unit-tests:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Restore dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Run unit tests
        run: npm run test:ci
        env:
          NODE_ENV: test

  e2e-tests:
    needs: install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        containers: [frontend, backend, integration]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Restore dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Restore build
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/web/.next
            apps/strapi/dist
            apps/strapi/build
          key: build-${{ github.sha }}

      - name: Start Strapi server
        if: matrix.containers != 'frontend'
        run: |
          npm run start:strapi &
          echo "Waiting for Strapi to be ready..."
          npx wait-on -t 60000 http://localhost:1337/admin/init

      - name: Start Next.js server
        if: matrix.containers == 'integration'
        run: |
          npm run start:web &
          echo "Waiting for Next.js to be ready..."
          npx wait-on -t 60000 http://localhost:3000

      - name: Cypress ${{ matrix.containers }} tests
        uses: cypress-io/github-action@v6
        with:
          command: npm run test:e2e:${{ matrix.containers }}
          browser: chrome
          config-file: cypress.config.ts
          wait-on: ${{ matrix.containers == 'frontend' && 'http://localhost:3000' || matrix.containers == 'backend' && 'http://localhost:1337' || 'http://localhost:3000,http://localhost:1337' }}
          wait-on-timeout: 120
        env:
          COMMIT_INFO_MESSAGE: ${{ github.event.pull_request.title }}
          COMMIT_INFO_SHA: ${{ github.event.pull_request.head.sha }}
          APP_KEYS: test-key-1,test-key-2,test-key-3,test-key-4
          API_TOKEN_SALT: 11111111111111111111111111111111
          ADMIN_JWT_SECRET: 22222222222222222222222222222222
          TRANSFER_TOKEN_SALT: 33333333333333333333333333333333
          JWT_SECRET: 44444444444444444444444444444444
          JWT_TOKEN_EXPIRATION: 7d
          NODE_ENV: test
          DATABASE_FILENAME: .tmp/test.db

      - name: Upload Cypress Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.containers }}
          path: cypress/screenshots
          retention-days: 5
          
      - name: Upload Cypress Videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ matrix.containers }}
          path: cypress/videos
          retention-days: 5
          
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Biome
        uses: biomejs/setup-biome@v1
        with:
          version: 1.9.4
        
      - name: Run Biome
        run: biome ci . 

  coverage:
    needs: [unit-tests]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Generate Coverage Badge
        run: |
          COVERAGE=$(cat ./apps/web/coverage/coverage-summary.json | jq -r '.total.lines.pct')
          COLOR=$(if [ $(echo "$COVERAGE >= 80" | bc -l) -eq 1 ]; then echo "green"; elif [ $(echo "$COVERAGE >= 60" | bc -l) -eq 1 ]; then echo "yellow"; else echo "red"; fi)
          echo "<svg xmlns='http://www.w3.org/2000/svg' width='106' height='20'><linearGradient id='a' x2='0' y2='100%'><stop offset='0' stop-color='#bbb' stop-opacity='.1'/><stop offset='1' stop-opacity='.1'/></linearGradient><rect rx='3' width='106' height='20' fill='#555'/><rect rx='3' x='44' width='62' height='20' fill='#$COLOR'/><path fill='#$COLOR' d='M44 0h4v20h-4z'/><rect rx='3' width='106' height='20' fill='url(#a)'/><g fill='#fff' text-anchor='middle' font-family='DejaVu Sans,Verdana,Geneva,sans-serif' font-size='11'><text x='23' y='15' fill='#010101' fill-opacity='.3'>coverage</text><text x='23' y='14'>coverage</text><text x='74' y='15' fill='#010101' fill-opacity='.3'>$COVERAGE%</text><text x='74' y='14'>$COVERAGE%</text></g></svg>" > ./apps/web/coverage/badge.svg

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload coverage report
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/coverage

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            apps/web/coverage
            apps/strapi/coverage
          retention-days: 5 