name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Cache dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build
        run: npm run build

      - name: Save build output
        uses: actions/cache/save@v4
        with:
          path: |
            apps/web/.next
            apps/strapi/dist
            apps/strapi/build
          key: build-${{ github.sha }}

  unit-tests:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Restore dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Run unit tests
        run: npm run test:ci
        env:
          NODE_ENV: test

  e2e-tests:
    needs: install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        containers: [frontend, backend, integration]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Restore dependencies
        uses: actions/cache/restore@v4
        with:
          path: |
            **/node_modules
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Restore build
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/web/.next
            apps/strapi/dist
            apps/strapi/build
          key: build-${{ github.sha }}

      - name: Cypress ${{ matrix.containers }} tests
        uses: cypress-io/github-action@v6
        with:
          command: npm run test:e2e:${{ matrix.containers }}
          browser: chrome
          config-file: cypress.config.ts
        env:
          COMMIT_INFO_MESSAGE: ${{ github.event.pull_request.title }}
          COMMIT_INFO_SHA: ${{ github.event.pull_request.head.sha }}
          APP_KEYS: test-key-1,test-key-2,test-key-3,test-key-4
          API_TOKEN_SALT: 11111111111111111111111111111111
          ADMIN_JWT_SECRET: 22222222222222222222222222222222
          TRANSFER_TOKEN_SALT: 33333333333333333333333333333333
          JWT_SECRET: 44444444444444444444444444444444
          JWT_TOKEN_EXPIRATION: 7d

      - name: Upload Cypress Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.containers }}
          path: cypress/screenshots
          retention-days: 5
          
      - name: Upload Cypress Videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ matrix.containers }}
          path: cypress/videos
          retention-days: 5
          
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Biome
        uses: biomejs/setup-biome@v1
        with:
          version: 1.9.4
        
      - name: Run Biome
        run: biome ci . 